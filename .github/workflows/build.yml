name: Build & Release FocusBook

on:
  push:
    branches: [main]
    tags: ['v*']     # e.g. v1.0.0 → triggers release job
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------
  # Lint & Code Quality
  # -----------------------------
  lint:
    name: Lint & Code Quality
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps (skip native compilation for lint)
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true


  # -----------------------------
  # Build (Windows)
  # -----------------------------
  build:
    name: Build (Windows)
    needs: lint
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'AI_agent/requirements.txt'

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r AI_agent/requirements.txt

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f

      - name: Build AI Service
        run: npm run build-ai-service

      - name: Build Electron App
        run: npm run build

      - name: Package App (Windows)
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: focusbook-windows
          path: |
            dist/*.exe
            dist/*.msi
          retention-days: 30


  # -----------------------------
  # Release Job
  # -----------------------------
  release:
    name: Publish Release
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')  # ONLY on tags

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: focusbook-windows
          path: dist/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/windows/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
