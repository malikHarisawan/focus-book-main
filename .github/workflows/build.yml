name: Build & Release FocusBook

on:
  push:
    branches: [main]
    tags: ['v*']     # e.g. v1.0.0 → triggers release job
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------
  # Lint & Code Quality
  # -----------------------------
  lint:
    name: Lint & Code Quality
    # ESLint is pure JS — run it on the free (1x-cost) Ubuntu runner, not a
    # Windows runner (2x cost). Only the electron-builder --win packaging below
    # actually needs Windows. Keeping lint on Ubuntu also avoids the Windows
    # runner-queue starvation that cancelled this job after 15m.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22 to match the build job — some devDependencies (@electron/rebuild
          # and its node-gyp 12.x) declare engines >= 22.12, so a uniform version
          # avoids EBADENGINE warnings during npm ci.
          node-version: 22
          cache: npm

      - name: Install Node deps (skip native compilation for lint)
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true


  # -----------------------------
  # Build (Windows)
  # -----------------------------
  build:
    name: Build (Windows)
    needs: lint
    # windows-latest now ships Visual Studio 2026 (v18). We build on it via
    # @electron/rebuild@4.x, whose bundled node-gyp 12.x recognizes VS 18
    # (find-visualstudio.js maps versionMajor 18 -> 2026). @electron/rebuild@4
    # requires Node >= 22.12, so this job pins Node 22. See nodejs/node-gyp#3282.
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'AI_agent/requirements.txt'

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r AI_agent/requirements.txt

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f

      - name: Build AI Service
        run: npm run build-ai-service

      - name: Build Electron App
        run: npm run build

      - name: Package App (Windows)
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: focusbook-windows
          path: |
            dist/*.exe
            dist/*.msi
          retention-days: 30


  # -----------------------------
  # Release Job
  # -----------------------------
  release:
    name: Publish Release
    needs: build
    # Just downloads the built artifacts and creates a GitHub release — no
    # compilation or Windows tooling — so it runs on the free Ubuntu runner.
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')  # ONLY on tags

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: focusbook-windows
          path: dist/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/windows/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
