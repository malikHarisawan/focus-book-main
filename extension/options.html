<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FocusBook Tab Reporter</title>
    <style>
      body {
        font-family: -apple-system, Segoe UI, Roboto, sans-serif;
        max-width: 460px;
        margin: 32px auto;
        padding: 0 16px;
        color: #1e293b;
      }
      h1 {
        font-size: 18px;
      }
      p {
        font-size: 14px;
        line-height: 1.5;
        color: #475569;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-family: monospace;
        font-size: 13px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
      }
      button {
        margin-top: 12px;
        padding: 8px 16px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }
      #status {
        margin-top: 12px;
        font-size: 13px;
      }
      .ok {
        color: #16a34a;
      }
    </style>
  </head>
  <body>
    <h1>FocusBook Tab Reporter</h1>
    <p>
      Paste the pairing token shown in FocusBook &rarr; Settings. The extension
      uses it to authenticate with the desktop app over a local connection. It
      reports only which tab is active — never how long you spend anywhere.
    </p>
    <input id="token" type="text" placeholder="Paste token here" autocomplete="off" spellcheck="false" />
    <button id="save">Save token</button>
    <div id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
